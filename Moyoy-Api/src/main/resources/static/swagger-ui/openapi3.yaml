openapi: 3.0.1
info:
  title: Moyoy API Server
  description: Moyoy API Server description
  version: v1.0.0
servers:
- url: https://api.moyoy-test.shop
- url: http://localhost:8080
tags: []
paths:
  /api/v1/rankings:
    get:
      tags:
      - 🏆 랭킹 조회
      summary: 전체 개인 랭킹 조회 API
      description: 우리 서비스의 전체 개인 랭킹을 조회합니다.
      operationId: 전체 개인 랭킹 조회 성공
      parameters:
      - name: period
        in: query
        description: 조회할 랭킹 기간 <br/><br/> week <br/> month <br/> year
        required: true
        schema:
          type: string
          default: week
      - name: page
        in: query
        description: "조회할 페이지 (default: 0)"
        required: false
        schema:
          type: integer
          format: int32
      - name: size
        in: query
        description: "페이징 사이즈 (default: 20)"
        required: false
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-rankings-897472962"
              examples:
                전체 개인 랭킹 조회 성공:
                  value: "{\"status\":200,\"code\":\"OK\",\"message\":null,\"data\"\
                    :{\"rankingList\":[{\"userId\":1,\"profileImageUrl\":\"image\"\
                    ,\"username\":\"moyoy\",\"rankPoint\":1234}],\"lastPage\":true}}"
  /api/v1/follow/{targetUserId}:
    post:
      tags:
      - 👥 깃허브 팔로우 관계 탐지
      summary: 깃허브 사용자 팔로우 API
      description: 현재 로그인한 사용자가 targetUserId에 해당하는 깃허브 상 사용자를 팔로우합니다.
      operationId: 팔로우 성공
      parameters:
      - name: targetUserId
        in: path
        description: 팔로우 대상 사용자 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-unfollow-targetUserId-767089392"
              examples:
                팔로우 성공:
                  value: "{\"status\":204,\"code\":\"NO_CONTENT\",\"message\":null,\"\
                    data\":null}"
      security:
      - bearerAuthJWT: []
  /api/v1/unfollow/{targetUserId}:
    delete:
      tags:
      - 👥 깃허브 팔로우 관계 탐지
      summary: 깃허브 사용자 언팔로우 API
      description: 현재 로그인한 사용자가 targetUserId에 해당하는 깃허브 사용자를 언 팔로우합니다.
      operationId: 언팔로우 성공
      parameters:
      - name: targetUserId
        in: path
        description: 언 팔로우 대상 사용자 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-unfollow-targetUserId-767089392"
              examples:
                언팔로우 성공:
                  value: "{\"status\":204,\"code\":\"NO_CONTENT\",\"message\":null,\"\
                    data\":null}"
      security:
      - bearerAuthJWT: []
  /api/v1/auth/reissue/token:
    post:
      tags:
      - 🔄 JWT 재발급
      summary: JWT 토큰 재발급 API
      description: "사용자의 요청에 포함된 Cookie 중 refresh={리프레시 토큰}을 이용해 토큰 재발급을 수행하며, 새로운\
        \ Access 토큰은 응답 본문에, Refresh 토큰은 Set-Cookie 헤더를 통해 발급합니다. \n 자세한 사용법은 디스코드\
        를 참고 해 주세요"
      operationId: JWT 재발급 성공LOGIN_401_1LOGIN_401_2LOGIN_401_3LOGIN_401_4LOGIN_401_5
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-auth-reissue-token1995903112"
              examples:
                JWT 재발급 성공:
                  value: "{\"status\":200,\"code\":\"OK\",\"message\":null,\"data\"\
                    :{\"accessToken\":\"newAccessToken\"}}"
        "401":
          description: "401"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-auth-reissue-token-1735855461"
              examples:
                LOGIN_401_1:
                  value: "{\"status\":401,\"code\":\"LOGIN_401_1\",\"message\":\"인\
                    증 헤더나 쿠키에 JWT 토큰이 존재 하지 않습니다.\",\"data\":null}"
                LOGIN_401_2:
                  value: "{\"status\":401,\"code\":\"LOGIN_401_2\",\"message\":\"토\
                    큰 타입이 올바르지 않습니다.\",\"data\":null}"
                LOGIN_401_3:
                  value: "{\"status\":401,\"code\":\"LOGIN_401_3\",\"message\":\"유\
                    효하지 않은 토큰입니다.\",\"data\":null}"
                LOGIN_401_4:
                  value: "{\"status\":401,\"code\":\"LOGIN_401_4\",\"message\":\"만\
                    료된 토큰입니다.\",\"data\":null}"
                LOGIN_401_5:
                  value: "{\"status\":401,\"code\":\"LOGIN_401_5\",\"message\":\"블\
                    랙리스트 처리된 토큰 입니다.\",\"data\":null}"
  /api/v1/users/me/profile:
    get:
      tags:
      - 🙋 유저 프로필
      summary: 유저 개인 프로필 조회 API
      description: 유저의 프로필 및 관련 데이터를 조회합니다.
      operationId: 사용자 프로필 조회 성공
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-users-me-profile1651746436"
              examples:
                사용자 프로필 조회 성공:
                  value: "{\"status\":200,\"code\":\"OK\",\"message\":null,\"data\"\
                    :{\"userId\":1234,\"username\":\"moyoy\",\"rankPoint\":10000,\"\
                    rankGrade\":\"A\",\"profileImgUrl\":\"https://~\"}}"
      security:
      - bearerAuthJWT: []
  /api/v1/users/me/followings/refresh:
    post:
      tags:
      - 👥 깃허브 팔로우 관계 탐지
      summary: 깃허브 팔로우 관계 탐지기 캐시 강제 갱신 요청
      description: "현재 사용자의 요청을 처리하기 위한 데이터 강제 갱신 요청, 캐시에 데이터가 이미 존재하면 강제갱신, 데이터가\
        \ 없으면 수집"
      operationId: github-follow-refresh-fail맞팔탐지기 조회를 위한 데이터 강제 갱신 요청
      responses:
        "400":
          description: "400"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-users-me-followings-refresh492296449"
              examples:
                github-follow-refresh-fail:
                  value: "{\"status\":400,\"code\":\"FOLLOW_400_1\",\"message\":\"\
                    최신 스냅샷 생성 후 5분 이상 경과해야 갱신할 수 있습니다.\",\"data\":null}"
        "202":
          description: "202"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-users-me-followings-detectType63148865"
              examples:
                맞팔탐지기 조회를 위한 데이터 강제 갱신 요청:
                  value: "{\"status\":202,\"code\":\"ACCEPTED\",\"message\":null,\"\
                    data\":null}"
      security:
      - bearerAuthJWT: []
  /api/v1/users/me/followings/{detectType}:
    get:
      tags:
      - 👥 깃허브 팔로우 관계 탐지
      summary: 깃허브 팔로우 관계 탐지 API
      description: |
        현재 로그인한 사용자의 Github 팔로워/팔로잉 목록에서
        요청한 detectType(맞팔로우, 나만 팔로우, 상대만 나를 팔로우)에 해당하는 사용자 목록을 조회합니다.
        <br/>
        캐시를 활용해 성능을 최적화합니다.
        - 캐시에 데이터가 존재하는 경우: 서버는 즉시 `200 OK`와 함께 결과를 반환합니다.
        - 캐시에 데이터가 없는 경우: 서버는 `202 Accepted`를 반환하고, 백그라운드 작업을 통해 데이터를 캐시에 적재합니다.
          클라이언트는 잠시 대기 후 동일 요청을 다시 시도하면, 이후에는 `200 OK`와 함께 캐시된 결과를 받을 수 있습니다.
      operationId: 맞팔탐지기 조회
      parameters:
      - name: detectType
        in: path
        description: mutual  (맞팔로우)<br/> follow-only  (나만 상대를 팔로우)<br/> followed-only
          (상대만 나를 팔로우)
        required: true
        schema:
          type: string
          default: mutual
      - name: lastGithubUserId
        in: query
        description: "이전 페이지에서 조회한 회원중 마지막 회원의 GithubUserId ,해당 파라미터는 비워둘 시 첫 페이지\
          \ 조회로 간주 합니다. "
        required: false
        schema:
          type: integer
          format: int32
      - name: size
        in: query
        description: "조회할 사용자 수 (default: 30)"
        required: false
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-users-me-followings-detectType220603757"
              examples:
                맞팔탐지기 조회 성공:
                  value: "{\"status\":200,\"code\":\"OK\",\"message\":null,\"data\"\
                    :{\"userList\":[{\"githubUserId\":12345,\"username\":\"username1\"\
                    ,\"profileImgUrl\":\"http://profile.image/1\"},{\"githubUserId\"\
                    :67890,\"username\":\"username2\",\"profileImgUrl\":\"http://profile.image/2\"\
                    }],\"lastPage\":true,\"totalUserCount\":2,\"lastSyncAt\":\"2025-08-28T16:16:10.944301811\"\
                    }}"
        "202":
          description: "202"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-users-me-followings-detectType63148865"
              examples:
                맞팔탐지기 조회를 위한 데이터 수집 요청 완료:
                  value: "{\"status\":202,\"code\":\"ACCEPTED\",\"message\":null,\"\
                    data\":null}"
      security:
      - bearerAuthJWT: []
components:
  schemas:
    api-v1-users-me-followings-detectType63148865:
      required:
      - code
      - message
      - status
      type: object
      properties:
        code:
          type: string
          description: 🔢 응답 코드
        status:
          type: number
          description: ✅ 응답 상태 코드
    api-v1-auth-reissue-token-1735855461:
      required:
      - code
      - message
      - status
      type: object
      properties:
        code:
          type: string
          description: 🔢 에러 코드
        message:
          type: string
          description: 📝 에러 메시지
        status:
          type: number
          description: ❌ 응답 상태 코드
    api-v1-users-me-followings-refresh492296449:
      required:
      - code
      - message
      - status
      type: object
      properties:
        code:
          type: string
          description: 🔢 도메인 에러 코드
        message:
          type: string
          description: 📝 상세 에러 메시지
        status:
          type: number
          description: ❌ 응답 상태 코드 (HTTP status)
    api-v1-unfollow-targetUserId-767089392:
      required:
      - code
      - status
      type: object
      properties:
        code:
          type: string
          description: 🔢 응답 코드
        status:
          type: number
          description: ✅ 응답 상태 코드
    api-v1-users-me-profile1651746436:
      required:
      - code
      - message
      - status
      type: object
      properties:
        code:
          type: string
          description: 🔢 응답 코드
        data:
          required:
          - profileImgUrl
          - rankGrade
          - rankPoint
          - userId
          - username
          type: object
          properties:
            rankGrade:
              type: string
              description: 📊 사용자 랭킹 등급
            profileImgUrl:
              type: string
              description: 🖼️ 사용자 프로필 이미지 URL
            userId:
              type: number
              description: 👦 사용자 ID
            rankPoint:
              type: number
              description: 🌟 사용자 랭킹 점수
            username:
              type: string
              description: 🙋 사용자 이름
        status:
          type: number
          description: ✅ 응답 상태 코드
    api-v1-users-me-followings-detectType220603757:
      required:
      - code
      - message
      - status
      type: object
      properties:
        code:
          type: string
          description: 🔢 응답 코드
        data:
          required:
          - lastPage
          - lastSyncAt
          - totalUserCount
          - userList
          type: object
          properties:
            totalUserCount:
              type: number
              description: 📊 총 사용자 수
            userList:
              type: array
              description: 👤 탐지된 사용자 목록
              items:
                required:
                - githubUserId
                - profileImgUrl
                - username
                type: object
                properties:
                  profileImgUrl:
                    type: string
                    description: 사용자 프로필 이미지 URL
                  githubUserId:
                    type: number
                    description: 사용자 Github ID
                  username:
                    type: string
                    description: 사용자 이름
            lastPage:
              type: boolean
              description: 📌 마지막 페이지 여부
            lastSyncAt:
              type: string
              description: ⏱ 마지막 싱크 시간 타임 스탬프
        status:
          type: number
          description: ✅ 응답 상태 코드
    api-v1-rankings-897472962:
      required:
      - code
      - data
      - message
      - status
      type: object
      properties:
        code:
          type: string
          description: 🔢 응답 코드
        data:
          required:
          - lastPage
          - rankingList
          type: object
          properties:
            lastPage:
              type: boolean
              description: 📌 마지막 페이지 여부
            rankingList:
              type: array
              description: 👤 탐지된 사용자 목록
              items:
                required:
                - profileImageUrl
                - rankPoint
                - userId
                - username
                type: object
                properties:
                  profileImageUrl:
                    type: string
                    description: 사용자 프로필 이미지 URL
                  userId:
                    type: number
                    description: 사용자 Id
                  rankPoint:
                    type: number
                    description: 사용자 랭킹 점수
                  username:
                    type: string
                    description: 사용자 이름
          description: 응답 데이터
        status:
          type: number
          description: ✅ 응답 상태 코드
    api-v1-auth-reissue-token1995903112:
      required:
      - code
      - message
      - status
      type: object
      properties:
        code:
          type: string
          description: 🔢 응답 코드
        data:
          required:
          - accessToken
          type: object
          properties:
            accessToken:
              type: string
              description: 🔑 새로 발급된 Access Token
        status:
          type: number
          description: ✅ 응답 상태 코드
  securitySchemes:
    bearerAuthJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
