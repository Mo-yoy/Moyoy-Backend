spring:
  config:
    import:
      - infra.yml

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
            redirect-uri: ${REDIRECT_URI}
            scope: ${SCOPE}

      authorized-client:
        crypto:
          password: ${AUTHORIZED_CLIENT_CRYPTO_PASSWORD}
          salt: ${AUTHORIZED_CLIENT_CRYPTO_SALT}

  jwt:
    secret: ${JWT_SECRET_KEY}

  cors:
    allow-origin: ${ALLOW_ORIGIN:http://localhost:5173}

  cookie:
    samesite: ${COOKIE_SAME_SITE:Strict}
    domain: ${COOKIE_DOMAIN:localhost}

  login:
    default-uri: ${DEFAULT_URI:http://localhost:5173/menu}

logging:
  config: classpath:logback/logback-${spring.profiles.active:local}.xml