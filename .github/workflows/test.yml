name: Moyo API Test Server Deploy

on:
  push:
    branches:
      - develop
    path:
      - backend/**

jobs:
  Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Github Repository 에서 파일 불러 오기
        uses: actions/checkout@v4

      - name: JDK 21버전 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle 캐싱
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle','**/*.gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 빌드
        run: ./gradlew clean build

      - name: 빌드된 JAR 파일 이름 변경
        run: mv ./build/libs/*SNAPSHOT.jar ./project.jar

      - name: AWS 인증 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: S3로 JAR 업로드
        run: aws s3 cp ./project.jar s3://${{ secrets.DEPLOY_S3_BUCKET }}/project.jar

      - name: SSM RunCommand로 EC2에 배포 명령 실행
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy from GitHub Actions" \
            --parameters "commands=[
              \"bash -c '
                cd /root &&
                source ${{ secrets.TEST_ENV }} &&
                aws s3 cp s3://${{ secrets.DEPLOY_S3_BUCKET }}/project.jar /root/moyo-test/tobe/project.jar &&
                rm -rf /root/moyo-test/current &&
                mkdir /root/moyo-test/current &&
                mv /root/moyo-test/tobe/project.jar /root/moyo-test/current/project.jar &&
                cd /root/moyo-test/current &&
                sudo fuser -k -n tcp 8080 || true &&
                nohup java -jar project.jar --spring.profiles.active=test --server.port=8080 &
                rm -rf /root/moyo-test/tobe
              '\"
            ]" \
            --output text
