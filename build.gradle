plugins {
    id 'java'
    id 'org.springframework.boot' version '3.4.1'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'com.epages.restdocs-api-spec' version '0.19.2'
    id 'com.diffplug.spotless' version "6.25.0"
}

group = 'com.Moyo'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

dependencies {

    implementation 'org.apache.commons:commons-lang3:3.13.0'

    // Web
    implementation 'org.springframework.boot:spring-boot-starter-web'

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // Validation
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // MySQL
    runtimeOnly 'com.mysql:mysql-connector-j'

    // Redis
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'

    // JPA
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'

    // QueryDSL
    implementation 'com.querydsl:querydsl-jpa:5.0.0:jakarta'
    annotationProcessor "com.querydsl:querydsl-apt:${dependencyManagement.importedProperties['querydsl.version']}:jakarta"
    annotationProcessor "jakarta.annotation:jakarta.annotation-api"
    annotationProcessor "jakarta.persistence:jakarta.persistence-api"

    // Spring Security
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-client'
    implementation 'org.springframework.boot:spring-boot-starter-security'

    // Test
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.springframework.restdocs:spring-restdocs-mockmvc'
    testImplementation 'com.epages:restdocs-api-spec-mockmvc:0.19.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // Logback
    implementation 'ca.pjer:logback-awslogs-appender:1.6.0'
    implementation 'net.logstash.logback:logstash-logback-encoder:7.4'
}


tasks.named('test') {
    useJUnitPlatform()
}

bootJar {
    dependsOn 'copyOasToSwagger'
}

openapi3 {
    servers = [
            { url = "https://moyoy-test.shop"},
            { url = "http://localhost:8080" }
    ]
    title = "Moyoy API Server"
    description = "Moyoy API Server description"
    version = "v1.0.0"
    format = "yaml"
}


tasks.register('copyOasToSwagger', Copy) {

    dependsOn 'openapi3'

    doFirst {
        delete file('src/main/resources/static/swagger-ui/openapi3.yaml')
    }

    from("$buildDir/api-spec/openapi3.yaml")

    into('src/main/resources/static/swagger-ui')
}

tasks.named('build') {
    dependsOn 'spotlessApply'
}

spotless {
    java {
        eclipse().configFile('config/spotless/naver-code-convention.xml')
        importOrder('java', 'javax' , 'lombok' , 'org', 'com', 'com.moyo', '')
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
    }
}

