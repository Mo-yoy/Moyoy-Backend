spring:
  config:
    import:
      - "aws-parameterstore:/config/moyoy-test/" 

  flyway:
    enabled: true
    locations: classpath:db/migration/{vendor}
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate

aws:
  parameterstore:
    enabled: true
    prefix: /config
    name: moyoy-test